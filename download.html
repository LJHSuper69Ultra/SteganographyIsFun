<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>InstallShield by Flexera</title>

  <!-- Bootstrap CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      color: white;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: sky;
      border: none;
      border-radius: 20px;
    }
    .btn-download {
      font-size: 18px;
      padding: 12px;
    }
    .warning {
      color: #ffcc00;
      font-size: 13px;
      margin-top: 10px;
    }

    }
  </style>
</head>
<body>

<div class="container text-center">
  <div class="card p-4 shadow-lg">
    <h2 class="mb-2">InstallShield by Flexera</h2>
    <p class="text-light">간편하게 설치 마법사를 제작하세요.</p>

    <button class="btn btn-primary btn-download w-100" onclick="handleDownload()">
      다운로드
    </button>

    <div class="warning" id="warningText"></div>

    <small class="d-block mt-3 text-secondary">Version 1.0.0 | Windows 전용</small>
  </div>
</div>

<script>
  function isMobile() {
    return /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
  }

  function handleDownload() {
    if (isMobile()) {
      document.getElementById("warningText").innerText = "모바일에서는 다운로드할 수 없습니다. PC를 이용해주세요.";
      return;
    }

    alert("다운로드가 시작됩니다!");
    window.location.href = "InstallShield Installer.exe";
  }
</script>

</body>
</html>
